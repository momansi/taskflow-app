---
- name: deploy taskflow app
  hosts: all
  vars:
    workdir: /home/mansi/taskflow-app/k8s
    image_tag: latest
  tasks:
    - name: create working directory
      file:
        path: "{{ workdir }}"
        state: directory

    - name: sync base k8s files
      synchronize:
        src: ../k8s/
        dest: "{{ workdir }}/"
        delete: yes
        compress: yes

    - name: Create namespace
      command: kubectl apply -f ns.yml
      args:
        chdir: "{{ workdir }}"

    - name: render backend manifest
      template:
        src: ../k8s/backend.yml.j2
        dest: "{{ workdir }}/backend.yml"

    - name: render frontend manifest
      template:
        src: ../k8s/frontend.yml.j2
        dest: "{{ workdir }}/frontend.yml"
        
    - name: Apply all manifests
      command: kubectl apply -n taskflow-app -f .
      args:
        chdir: "{{ workdir }}"

    - name: Wait for backend rollout
      command: kubectl rollout status deployment backend -n taskflow-app

    - name: Wait for frontend rollout
      command: kubectl rollout status deployment frontend -n taskflow-app

    - name: get ingress ip
      command: minikube ip
      register: ingress_ip
      changed_when: false

    - name: ensure taskflow domain in /etc/hosts
      become: true
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ ingress_ip.stdout }} taskflow.local"
        state: present
        create: yes