---
- name: deploy taskflow app
  hosts: all
  vars:
    workdir: /home/mansi/taskflow-app/k8s
  tasks:
    - name: sync k8s files
      synchronize: 
        src: ./k8s/
        dest: "{{ workdir }}/"
        compress: yes

    - name: Create namespace
      command: kubectl apply -f ns.yml
      args:
        chdir: "{{ workdir }}"
        
    - name: Apply all manifests
      command: kubectl apply -n taskflow-app -f .
      args:
        chdir: "{{ workdir }}"

    - name: Restart backend
      command: kubectl rollout restart deployment backend -n taskflow-app

    - name: Restart frontend
      command: kubectl rollout restart deployment frontend -n taskflow-app

    - name: Wait for backend rollout
      command: kubectl rollout status deployment backend -n taskflow-app

    - name: Wait for frontend rollout
      command: kubectl rollout status deployment frontend -n taskflow-app