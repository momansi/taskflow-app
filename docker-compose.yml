version: '3'
services:
  frontend:
    container_name: frontend_app
    image: muhammadelmansi/taskflow-frontend:latest
    networks:
      - app_network

  backend:
    container_name: backend_app
    image: muhammadelmansi/taskflow-backend:latest
    env_file:
      - ./.env
    depends_on:
      - postgres
    networks:
      - app_network
    
  postgres:
    container_name: db_postgres
    image: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pg_data:/var/lib/postgresql
    networks:
      - app_network

  reverse-proxy:
    container_name: nginx_app
    image: nginx
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - backend
      - postgres
    networks:
      - app_network

networks:
  app_network:

volumes:
  pg_data: